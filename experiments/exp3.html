<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            transition: background 0.3s;
        }
        button, input {
            padding: 10px;
            margin: 5px;
        }
        #para {
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1 id="heading">Welcome</h1>

    <input type="text" id="inputText" placeholder="Enter new heading text">

    <br>

    <button id="changeTextBtn">Change Heading</button>
    <button id="colorBtn">Change Background</button>
    <button id="fontBtn">Increase Font</button>
    <button id="toggleBtn">Show/Hide Paragraph</button>

    <p id="para">This is a paragraph. Watch me change.</p>

    <script src="exp3.js">
    </script>

</body>
</html>
